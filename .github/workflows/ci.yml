name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -q

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8001
        run: npm run build

  render-auto-deploy-handoff:
    name: Render auto-deploy handoff
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - backend
      - frontend
    runs-on: ubuntu-latest
    steps:
      - name: Confirm handoff
        run: echo "CI passed on main. Render GitHub auto-deploy can now pick up this commit."
