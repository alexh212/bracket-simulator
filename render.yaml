services:
  # Backend: FastAPI + uvicorn
  - type: web
    name: bracketedge-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
    plan: free

  # Frontend: Next.js
  - type: web
    name: bracket-simulator
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_API_URL
        value: https://bracketedge-api.onrender.com
    plan: free
